# .github/workflows/codex-scheduled-task.yml

name: Codex Scheduled Task

on:
  schedule:
    - cron: "0 22 * * *"   # 台灣時間 06:00
    - cron: "5 3 * * *"    # 台灣時間 11:05
    - cron: "10 8 * * *"   # 台灣時間 16:10
    - cron: "15 13 * * *"  # 台灣時間 21:15

  workflow_dispatch:

jobs:
  codex-task:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex

      - name: Run Codex hello task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec "請用繁體中文說：嗨，這是每天四次的 Codex GitHub Actions 排程任務。"

      - name: Update heartbeat file
        run: |
          echo "# Codex Heartbeat" > codex-heartbeat.md
          echo "" >> codex-heartbeat.md
          echo "Last run UTC: $(date -u)" >> codex-heartbeat.md
          echo "Last run Taiwan time: $(TZ='Asia/Taipei' date)" >> codex-heartbeat.md

      - name: Commit and push
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@example.com"
          git add codex-heartbeat.md
          git diff --cached --quiet || git commit -m "chore: codex scheduled heartbeat"
          git push
